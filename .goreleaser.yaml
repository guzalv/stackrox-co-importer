version: 2
project_name: co-acs-importer

builds:
  - id: importer
    main: ./cmd/importer
    binary: compliance-operator-importer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: ['tar.gz']
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# IMP-IMG-001, IMP-IMG-002, IMP-IMG-003, IMP-IMG-005
dockers:
  - use: buildx
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/guzalv/co-acs-importer:{{ .Version }}-amd64"
      - "ghcr.io/guzalv/co-acs-importer:latest-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=co-acs-importer"
      - "--label=org.opencontainers.image.description=Compliance Operator to ACS scan configuration importer"
      - "--label=org.opencontainers.image.source=https://github.com/guzalv/stackrox-co-importer"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
  - use: buildx
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/guzalv/co-acs-importer:{{ .Version }}-arm64"
      - "ghcr.io/guzalv/co-acs-importer:latest-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64/v8"
      - "--label=org.opencontainers.image.title=co-acs-importer"
      - "--label=org.opencontainers.image.description=Compliance Operator to ACS scan configuration importer"
      - "--label=org.opencontainers.image.source=https://github.com/guzalv/stackrox-co-importer"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"

docker_manifests:
  - name_template: "ghcr.io/guzalv/co-acs-importer:{{ .Version }}"
    image_templates:
      - "ghcr.io/guzalv/co-acs-importer:{{ .Version }}-amd64"
      - "ghcr.io/guzalv/co-acs-importer:{{ .Version }}-arm64"
  - name_template: "ghcr.io/guzalv/co-acs-importer:latest"
    image_templates:
      - "ghcr.io/guzalv/co-acs-importer:latest-amd64"
      - "ghcr.io/guzalv/co-acs-importer:latest-arm64"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

snapshot:
  version_template: "{{ incpatch .Version }}-dev-{{ .ShortCommit }}"

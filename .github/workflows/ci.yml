name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  # ── Fast checks (lint + unit/godog tests) ──────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          install-mode: goinstall

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit and Godog tests
        run: make test
      - name: Run tests with coverage
        run: |
          go test -coverprofile=coverage.out ./internal/...
          go tool cover -func=coverage.out | tail -1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        run: make build
      - name: Verify --version flag
        run: ./bin/compliance-operator-importer --version
      - name: Build container image
        run: make image
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: importer-binary
          path: bin/compliance-operator-importer
          retention-days: 1

  # ── E2E tests (kind + StackRox + Compliance Operator) ───────────────────────

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download importer binary
        uses: actions/download-artifact@v4
        with:
          name: importer-binary
          path: bin/
      - run: chmod +x bin/compliance-operator-importer

      - name: Install kind
        run: |
          KIND_VERSION="v0.27.0"
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up kind cluster with StackRox and Compliance Operator
        id: setup
        run: |
          hack/ci-setup-kind-stackrox.sh
          echo "rox-password=$(cat /tmp/rox-admin-password)" >> "$GITHUB_OUTPUT"
        env:
          CO_NAMESPACE: openshift-compliance

      - name: Run e2e tests
        run: make test-e2e
        env:
          ROX_ENDPOINT: "https://localhost:8443"
          ROX_ADMIN_USER: admin
          ROX_ADMIN_PASSWORD: ${{ steps.setup.outputs.rox-password }}
          CO_NAMESPACE: openshift-compliance
          IMPORTER_BIN: ${{ github.workspace }}/bin/compliance-operator-importer

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== StackRox pods ==="
          kubectl -n stackrox get pods
          echo "=== Central logs ==="
          kubectl -n stackrox logs deploy/central --tail=100 || true
          echo "=== Sensor logs ==="
          kubectl -n stackrox logs deploy/sensor --tail=50 || true
          echo "=== CO namespace pods ==="
          kubectl -n openshift-compliance get pods || true
          echo "=== CO operator logs ==="
          kubectl -n openshift-compliance logs deploy/compliance-operator --tail=50 || true
          echo "=== CO CRDs ==="
          kubectl get crd | grep compliance || true
          echo "=== CO resources ==="
          kubectl -n openshift-compliance get profiles,scansettings,scansettingbindings || true
          echo "=== Cluster ID ConfigMap ==="
          kubectl -n stackrox get configmap admission-control -o yaml || true

  # ── Auto-release (only on main, after e2e passes) ─────────────────────────

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine next version
        id: version
        run: |
          # Get latest tag, defaulting to v0.0.0 if none exists.
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          echo "Latest tag: ${latest}"

          # Check if HEAD is already tagged.
          head_tag=$(git tag --points-at HEAD | grep '^v' | head -1 || true)
          if [ -n "$head_tag" ]; then
            echo "HEAD already tagged as ${head_tag}, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-increment patch version.
          major=$(echo "$latest" | sed 's/^v//' | cut -d. -f1)
          minor=$(echo "$latest" | sed 's/^v//' | cut -d. -f2)
          patch=$(echo "$latest" | sed 's/^v//' | cut -d. -f3)
          next_patch=$((patch + 1))
          next_version="v${major}.${minor}.${next_patch}"

          echo "Next version: ${next_version}"
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Set up Docker Buildx
        if: steps.version.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        if: steps.version.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        if: steps.version.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        if: steps.version.outputs.skip != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

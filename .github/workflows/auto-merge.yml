name: Auto-merge

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (rebase)
        run: gh pr merge --auto --rebase "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
